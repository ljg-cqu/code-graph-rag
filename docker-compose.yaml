services:
  # ============================================
  # Code Graph (existing)
  # ============================================
  memgraph:
    image: memgraph/memgraph:latest
    ports:
      - "${MEMGRAPH_PORT:-7687}:7687"
      - "${MEMGRAPH_HTTP_PORT:-7444}:7444"
    command: ["--schema-info-enabled", "--also-log-to-stderr"]
    environment:
      - MEMGRAPH_MEMORY_LIMIT=${MEMGRAPH_MEMORY_LIMIT:-4GB}
    volumes:
      - memgraph_code_data:/var/lib/memgraph
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole"]
      interval: 30s
      timeout: 10s
      retries: 3

  lab:
    image: memgraph/lab:latest
    ports:
      - "${LAB_PORT:-3000}:3000"
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
    depends_on:
      - memgraph

  # ============================================
  # Document Graph (new)
  # ============================================
  memgraph-doc:
    image: memgraph/memgraph:latest
    ports:
      - "${DOC_MEMGRAPH_PORT:-7688}:7687"
    command: ["--schema-info-enabled", "--also-log-to-stderr"]
    environment:
      - MEMGRAPH_MEMORY_LIMIT=${DOC_MEMGRAPH_MEMORY_LIMIT:-2GB}
    volumes:
      - memgraph_doc_data:/var/lib/memgraph
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole"]
      interval: 30s
      timeout: 10s
      retries: 3

  lab-doc:
    image: memgraph/lab:latest
    ports:
      - "${DOC_LAB_PORT:-3001}:3000"
    environment:
      QUICK_CONNECT_MG_HOST: memgraph-doc
    depends_on:
      - memgraph-doc

volumes:
  memgraph_code_data:
  memgraph_doc_data:
